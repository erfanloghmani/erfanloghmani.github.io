    <script type="text/javascript">
    (function () {
        var sections = document.querySelectorAll('.cv-block .academic-section');
        if (!sections.length) return;
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            sections.forEach(function (section) { section.classList.add('is-visible'); });
            return;
        }
        if (!('IntersectionObserver' in window)) {
            sections.forEach(function (section) { section.classList.add('is-visible'); });
            return;
        }
        var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.18, rootMargin: '0px 0px -40px 0px' });
        sections.forEach(function (section) { observer.observe(section); });
    })();
    </script>
    <script type="text/javascript">
    (function () {
        var toggles = document.querySelectorAll('[data-photo-toggle]');
        toggles.forEach(function (wrap) {
            var btn = wrap.querySelector('.academic-avatar-btn');
            var img = wrap.querySelector('.academic-avatar-img');
            if (!btn || !img) return;
            var currentSrc = wrap.getAttribute('data-current-src');
            var oldSrc = wrap.getAttribute('data-old-src');
            var showingOld = false;
            btn.addEventListener('click', function () {
                showingOld = !showingOld;
                wrap.classList.toggle('is-oldlook', showingOld);
                img.src = showingOld ? oldSrc : currentSrc;
            });
        });
    })();
    </script>
