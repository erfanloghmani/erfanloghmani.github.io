<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 480" width="420" height="480" role="img" aria-labelledby="methods-title methods-desc">
  <title id="methods-title">Models compared</title>
  <desc id="methods-desc">Three models: base pretrained, SFT on answers without scores, and DPO on score-based preference pairs.</desc>
  <defs>
    <marker id="arrow-m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b2e83"/>
    </marker>
    <style type="text/css"><![CDATA[
      .frame { fill: #f7f5f2; stroke: #d9d2e6; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #4b2e83; stroke-width: 1.75; }
      .box-sft { fill: #efeaf8; stroke: #4b2e83; stroke-width: 1.75; }
      .box-dpo { fill: #eaf4fc; stroke: #4b2e83; stroke-width: 1.75; }
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #32215c; }
      .step { font-family: Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; fill: #b7a57a; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #4b2e83; }
      .sub { font-family: Helvetica, Arial, sans-serif; font-size: 12px; fill: #5a5368; }
      .flow { stroke: #4b2e83; stroke-width: 2.25; fill: none; marker-end: url(#arrow-m); }
    ]]></style>
  </defs>

  <rect class="frame" x="10" y="10" width="400" height="460" rx="16"/>
  <text class="title" x="210" y="42" text-anchor="middle">Models compared</text>

  <rect class="box" x="70" y="68" width="280" height="88" rx="12"/>
  <text class="step" x="210" y="98" text-anchor="middle">1</text>
  <text class="label" x="210" y="124" text-anchor="middle">Base pretrained</text>
  <text class="sub" x="210" y="146" text-anchor="middle">no fine-tuning on our data</text>

  <line class="flow" x1="210" y1="156" x2="210" y2="188"/>

  <rect class="box-sft" x="70" y="194" width="280" height="88" rx="12"/>
  <text class="step" x="210" y="224" text-anchor="middle">2</text>
  <text class="label" x="210" y="250" text-anchor="middle">SFT</text>
  <text class="sub" x="210" y="272" text-anchor="middle">trained on answers for domain adaptation</text>

  <line class="flow" x1="210" y1="282" x2="210" y2="314"/>

  <rect class="box-dpo" x="70" y="320" width="280" height="88" rx="12"/>
  <text class="step" x="210" y="350" text-anchor="middle">3</text>
  <text class="label" x="210" y="376" text-anchor="middle">DPO</text>
  <text class="sub" x="210" y="398" text-anchor="middle">score-based preference pairs</text>

  <text class="sub" x="210" y="444" text-anchor="middle">Generate on 3,000 held-out questions</text>
</svg>
