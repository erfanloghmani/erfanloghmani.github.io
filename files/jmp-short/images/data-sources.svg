<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" role="img" aria-labelledby="title desc">
  <title id="title">Observational vs experimental outcome data</title>
  <desc id="desc">Side-by-side comparison of observational and experimental data sources.</desc>

  <defs>
    <style type="text/css"><![CDATA[
      .card-obs { fill: #fdeeee; stroke: #c47a7a; stroke-width: 1.75; }
      .card-exp { fill: #eaf4fc; stroke: #6a9cc4; stroke-width: 1.75; }
      .head-obs { fill: #f5d4d4; stroke: #c47a7a; stroke-width: 1.75; }
      .head-exp { fill: #d4e8f7; stroke: #6a9cc4; stroke-width: 1.75; }
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #2a2a2a; }
      .from-label { font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; fill: #666666; }
      .from-text { font-family: Helvetica, Arial, sans-serif; font-size: 14px; fill: #333333; }
      .sec-pos { font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; fill: #2f6b45; }
      .sec-neg { font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; fill: #8a3a3a; }
      .item { font-family: Helvetica, Arial, sans-serif; font-size: 15px; fill: #222222; }
      .pill-obs { fill: #f8cfcf; }
      .pill-exp { fill: #cfe4f5; }
      .rule-obs { stroke: #d4a0a0; stroke-width: 1; }
      .rule-exp { stroke: #9bbad4; stroke-width: 1; }
    ]]></style>
  </defs>

  <!-- Observational -->
  <g transform="translate(24,24)">
    <rect class="card-obs" x="0" y="0" width="320" height="312" rx="14" ry="14"/>
    <path class="head-obs" d="M0,14 A14,14 0 0 1 14,0 H306 A14,14 0 0 1 320,14 V70 H0 Z"/>
    <text class="title" x="160" y="42" text-anchor="middle">Observational data</text>

    <text class="from-label" x="22" y="100">FROM</text>
    <rect class="pill-obs" x="18" y="112" width="284" height="44" rx="8" ry="8"/>
    <text class="from-text" x="160" y="132" text-anchor="middle">Historical performance logs</text>
    <text class="from-text" x="160" y="150" text-anchor="middle">(ongoing data collection)</text>

    <line class="rule-obs" x1="22" y1="174" x2="298" y2="174"/>

    <text class="sec-pos" x="22" y="198">PROS</text>
    <text class="item" x="22" y="222">Large-scale · easy to collect · abundant</text>

    <text class="sec-neg" x="22" y="258">CONS</text>
    <text class="item" x="22" y="282">Spurious correlation and bias</text>
  </g>

  <!-- Experimental -->
  <g transform="translate(376,24)">
    <rect class="card-exp" x="0" y="0" width="320" height="312" rx="14" ry="14"/>
    <path class="head-exp" d="M0,14 A14,14 0 0 1 14,0 H306 A14,14 0 0 1 320,14 V70 H0 Z"/>
    <text class="title" x="160" y="42" text-anchor="middle">Experimental data</text>

    <text class="from-label" x="22" y="100">FROM</text>
    <rect class="pill-exp" x="18" y="112" width="284" height="44" rx="8" ry="8"/>
    <text class="from-text" x="160" y="132" text-anchor="middle">A/B tests &amp; randomized</text>
    <text class="from-text" x="160" y="150" text-anchor="middle">experiments</text>

    <line class="rule-exp" x1="22" y1="174" x2="298" y2="174"/>

    <text class="sec-pos" x="22" y="198">PROS</text>
    <text class="item" x="22" y="222">Unbiased</text>

    <text class="sec-neg" x="22" y="258">CONS</text>
    <text class="item" x="22" y="282">Harder to collect · costly · noisy</text>
    <text class="item" x="22" y="302">(engineering &amp; opportunity cost)</text>
  </g>
</svg>
