<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360" role="img" aria-labelledby="bud-title bud-desc">
  <title id="bud-title">Limited experimentation budget</title>
  <desc id="bud-desc">Each month, rank incoming tests and experiment on a budget fraction; play-only for the rest.</desc>
  <defs>
    <marker id="arrow-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b2e83"/>
    </marker>
    <style type="text/css"><![CDATA[
      .box { fill: #ffffff; stroke: #4b2e83; stroke-width: 1.75; }
      .hist { fill: #fdeeee; stroke: #c47a7a; stroke-width: 1.75; }
      .gate { fill: #eaf4fc; stroke: #6a9cc4; stroke-width: 1.75; }
      .exp { fill: #efeaf8; stroke: #4b2e83; stroke-width: 1.75; }
      .play { fill: #f7f5f2; stroke: #85754d; stroke-width: 1.75; }
      .hdr { font-family: Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; fill: #85754d; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #4b2e83; }
      .sub { font-family: Helvetica, Arial, sans-serif; font-size: 11px; fill: #5a5368; }
      .flow { stroke: #4b2e83; stroke-width: 2; fill: none; marker-end: url(#arrow-b); }
    ]]></style>
  </defs>

  <rect class="hist" x="24" y="20" width="160" height="88" rx="12"/>
  <text class="label" x="104" y="56" text-anchor="middle">History</text>
  <text class="sub" x="104" y="78" text-anchor="middle">observational stock</text>

  <line class="flow" x1="184" y1="64" x2="220" y2="64"/>

  <rect class="box" x="226" y="20" width="310" height="88" rx="12"/>
  <text class="label" x="381" y="52" text-anchor="middle">Collection window T (1-8 months)</text>
  <text class="sub" x="381" y="76" text-anchor="middle">tests arrive sequentially each month</text>

  <text class="hdr" x="280" y="140" text-anchor="middle">EACH MONTH: REFIT MODELS, THEN GATE</text>

  <rect class="gate" x="24" y="156" width="512" height="70" rx="12"/>
  <text class="label" x="280" y="186" text-anchor="middle">Gating rule ranks this month's n tests</text>
  <text class="sub" x="280" y="208" text-anchor="middle">Experiment on top ceil(r n)   |   budget r in {0.1,...,1.0}</text>

  <line class="flow" x1="160" y1="226" x2="160" y2="252"/>
  <line class="flow" x1="400" y1="226" x2="400" y2="252"/>

  <rect class="exp" x="24" y="258" width="250" height="80" rx="12"/>
  <text class="label" x="149" y="292" text-anchor="middle">Experiment mode</text>
  <text class="sub" x="149" y="316" text-anchor="middle">see all arms (pay traffic cost)</text>

  <rect class="play" x="286" y="258" width="250" height="80" rx="12"/>
  <text class="label" x="411" y="292" text-anchor="middle">Play-only mode</text>
  <text class="sub" x="411" y="316" text-anchor="middle">commit to one arm (logistic / IVW)</text>
</svg>
