<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300" role="img" aria-labelledby="rlhf-title rlhf-desc">
  <title id="rlhf-title">RL-based alignment pipeline</title>
  <desc id="rlhf-desc">Three-step alignment: supervised fine-tuning, reward modeling, then reinforcement learning.</desc>
  <defs>
    <marker id="arrow-rlhf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b2e83"/>
    </marker>
    <style type="text/css"><![CDATA[
      .frame { fill: #f7f5f2; stroke: #d9d2e6; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #4b2e83; stroke-width: 1.75; }
      .box-rm { fill: #efeaf8; stroke: #4b2e83; stroke-width: 1.75; }
      .step { font-family: Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; fill: #b7a57a; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #4b2e83; }
      .sub { font-family: Helvetica, Arial, sans-serif; font-size: 13px; fill: #5a5368; }
      .flow { stroke: #4b2e83; stroke-width: 2.25; fill: none; marker-end: url(#arrow-rlhf); }
      .chip { fill: #4b2e83; }
      .chip-t { font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff; }
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #32215c; }
    ]]></style>
  </defs>

  <rect class="frame" x="8" y="8" width="504" height="284" rx="16"/>
  <text class="title" x="260" y="36" text-anchor="middle">RL pipeline (three stages)</text>

  <rect class="box" x="36" y="58" width="140" height="100" rx="12"/>
  <text class="step" x="106" y="86" text-anchor="middle">STEP 1</text>
  <text class="label" x="106" y="112" text-anchor="middle">SFT</text>
  <text class="sub" x="106" y="136" text-anchor="middle">demonstrations</text>

  <line class="flow" x1="176" y1="108" x2="214" y2="108"/>

  <rect class="box-rm" x="220" y="58" width="140" height="100" rx="12"/>
  <text class="step" x="290" y="86" text-anchor="middle">STEP 2</text>
  <text class="label" x="290" y="112" text-anchor="middle">Reward model</text>
  <text class="sub" x="290" y="136" text-anchor="middle">outcome data</text>

  <line class="flow" x1="360" y1="108" x2="398" y2="108"/>

  <rect class="box" x="404" y="58" width="80" height="100" rx="12"/>
  <text class="step" x="444" y="86" text-anchor="middle">STEP 3</text>
  <text class="label" x="444" y="112" text-anchor="middle">RL</text>
  <text class="sub" x="444" y="136" text-anchor="middle">e.g. PPO</text>

  <rect class="chip" x="56" y="200" width="120" height="32" rx="16"/>
  <text class="chip-t" x="116" y="221" text-anchor="middle">Base LM to SFT</text>

  <rect class="chip" x="200" y="200" width="120" height="32" rx="16"/>
  <text class="chip-t" x="260" y="221" text-anchor="middle">Learn r(x, y)</text>

  <rect class="chip" x="344" y="200" width="120" height="32" rx="16"/>
  <text class="chip-t" x="404" y="221" text-anchor="middle">Max E[r] - KL</text>

</svg>
